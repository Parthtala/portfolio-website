<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parth Trada - Portfolio</title>
    <style>
        /* Reset default margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
            text-align: center;
            padding: 20px;
        }

        header nav a {
            text-decoration: none;
            color: #333;
            margin: 0 15px;
            font-weight: 500;
            transition: color 0.3s;
        }

        header nav a:hover {
            color: #0077b6; /* nice blue hover */
        }

        h1 {
            font-size: 2.5rem;
            margin-top: 20px;
        }

        p {
            font-size: 1.2rem;
            margin-top: 10px;
        }

        nav {
            background-color: #fff;
            padding: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        nav a {
            display: inline-block;
        }

        /* Profile image styling */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* makes image circular */
            object-fit: cover;
            margin-top: 30px;
            border: 3px solid #0077b6;
        }

        @media (max-width: 600px) {
            .profile-img {
                width: 120px;
                height: 120px;
            }

            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="navigation bar/about.html">About</a>
            <a href="navigation bar/education.html">Education</a>
            <a href="navigation bar/experience.html">Experience</a>
            <a href="navigation bar/reachout.html">Reach Out</a>
        </nav>
    </header>

    <main>
        <h1>Hi, I'm Parth Trada</h1>
        <p>Welcome to my Portfolio!</p>
    </main>
</body>

</html>
